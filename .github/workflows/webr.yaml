name: webR check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build webR package with rwasm
        shell: bash
        run: |
          docker run --rm \
            -e CARGO_BUILD_JOBS=4 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ghcr.io/r-wasm/webr:main \
            bash -lc '
              set -euxo pipefail
              make clean || true
              R CMD build --no-build-vignettes .
              Rscript -e "if (!requireNamespace(\"pak\", quietly = TRUE)) install.packages(\"pak\", repos = \"https://repo.r-wasm.org/\"); pak::pak(\"r-wasm/rwasm\", ask = FALSE)"
              version=$(Rscript -e "cat(read.dcf(\"DESCRIPTION\")[1, \"Version\"])")
              Rscript -e "rwasm::build(sprintf(\"./Rsassy_%s.tar.gz\", read.dcf(\"DESCRIPTION\")[1, \"Version\"]))"
              test -f "Rsassy_${version}.tgz"
            '

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install webR Node package
        shell: bash
        run: npm install --prefix "$RUNNER_TEMP/webr-node" --no-save webr@0.5.9

      - name: Check local webR package
        shell: bash
        env:
          NODE_PATH: ${{ runner.temp }}/webr-node/node_modules
        run: node tools/webr-check.cjs "$(ls -t Rsassy_*.tgz | head -n 1)"
