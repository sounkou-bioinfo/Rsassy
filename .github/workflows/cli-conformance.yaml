name: CLI conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-conformance:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CARGO_BUILD_JOBS: 2

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::knitr, any::rmarkdown, any::tinytest
          needs: check

      - name: Install Rsassy
        run: make CARGO_JOBS=4 install

      - name: Install sassy CLI
        run: cargo install sassy --version 0.2.1 --features scalar --locked -j 2

      - name: Compare Rsassy against sassy CLI
        run: Rscript tools/cli-conformance.R "$(command -v sassy)"
