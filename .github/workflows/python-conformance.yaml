name: Python conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-conformance:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::reticulate, any::knitr, any::rmarkdown, any::tinytest
          needs: check

      - name: Install Rsassy
        run: make CARGO_JOBS=4 install

      - name: Install Python sassy-rs
        run: |
          uv venv .venv --python 3.11
          uv pip install --python .venv/bin/python sassy-rs

      - name: Compare Rsassy against Python bindings
        run: Rscript tools/python-conformance.R "$PWD/.venv"
